name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: No-data scan
        run: python scripts/no_data_scan.py
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Compile Python tools
        run: python -m py_compile template/tools/lint_vault.py template/tools/sync_office_md.py template/tools/sync_github_repos.py template/tools/benchmark_tasks.py template/tools/conversion_report.py template/tools/migration_report.py template/tools/pilot_report.py template/tools/recovery_report.py template/tools/sandbox_report.py template/tools/vaultwright.py src/vaultwright/cli.py src/vaultwright/__init__.py scripts/no_data_scan.py scripts/sync_template_copies.py
      - name: Shell syntax
        run: bash -n scripts/init.sh template/tools/sync_all.sh .githooks/pre-commit
      - name: Template copy drift check
        run: python scripts/sync_template_copies.py --check
      - name: Unit tests
        run: pytest
      - name: Installed CLI smoke test
        run: |
          vaultwright --help
          tmp_vault="$(mktemp -d)/vault"
          VAULTWRIGHT_REPO="$PWD" vaultwright init "$tmp_vault"
          vaultwright --root "$tmp_vault" plan
      - name: Wheel CLI smoke test
        run: |
          tmp_build="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmp_build/wheelhouse"
          python -m venv "$tmp_build/venv"
          "$tmp_build/venv/bin/python" -m pip install "$tmp_build"/wheelhouse/vaultwright-*.whl
          tmp_vault="$tmp_build/vault"
          mkdir -p "$tmp_build/original-documents"
          "$tmp_build/venv/bin/vaultwright" init "$tmp_vault"
          test -f "$tmp_vault/CLAUDE.md"
          test -f "$tmp_vault/tools/conversion_report.py"
          test -f "$tmp_vault/tools/pilot_report.py"
          test -f "$tmp_vault/tools/recovery_report.py"
          test -f "$tmp_vault/tools/sandbox_report.py"
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" doctor
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" plan
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" sandbox --source-root "$tmp_build/original-documents" --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" benchmark
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" conversion --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migration --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" pilot --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" pilot --worksheet
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" recovery --json
      - name: Template lint
        run: python template/tools/lint_vault.py
      - name: Regenerate example mirrors
        run: |
          tmp_example="$(mktemp -d)"
          for name in northwind-robotics-vault government-services-vault; do
            cp -R "examples/$name" "$tmp_example/"
            example="$tmp_example/$name"
            python "$example/tools/vaultwright.py" plan
            python "$example/tools/vaultwright.py" sync
            python "$example/tools/vaultwright.py" status
            echo "$example" >> /tmp/vaultwright-example-paths
          done
      - name: No-data scan after mirror generation
        run: |
          while IFS= read -r example; do
            find "$example" \( -name '*.md' -o -name '*.json' -o -name '*.jsonl' \) -type f -print0 | xargs -0 python scripts/no_data_scan.py --paths
          done < /tmp/vaultwright-example-paths
      - name: Example vault lint
        run: |
          while IFS= read -r example; do
            output="$(python "$example/tools/lint_vault.py")"
            printf '%s\n' "$output"
            grep -q "Orphan notes (no inbound links): 0" <<<"$output"
            grep -q "Potential duplicate/overlap notes: 0" <<<"$output"
          done < /tmp/vaultwright-example-paths
