name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: No-data scan
        run: python scripts/no_data_scan.py
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Compile Python tools
        run: python -m py_compile template/tools/lint_vault.py template/tools/sync_office_md.py template/tools/sync_github_repos.py template/tools/benchmark_tasks.py template/tools/catalog_report.py template/tools/conversion_report.py template/tools/m365_report.py template/tools/migration_report.py template/tools/overlap_report.py template/tools/pilot_report.py template/tools/recovery_report.py template/tools/review_ledger.py template/tools/sandbox_report.py template/tools/vaultwright.py src/vaultwright/annotation_migration.py src/vaultwright/catalog.py src/vaultwright/cli.py src/vaultwright/lint.py src/vaultwright/mirrors/__init__.py src/vaultwright/mirrors/github_repos.py src/vaultwright/mirrors/office.py src/vaultwright/profile_migration.py src/vaultwright/__init__.py scripts/no_data_scan.py scripts/sync_template_copies.py
      - name: Shell syntax
        run: bash -n scripts/init.sh template/tools/sync_all.sh .githooks/pre-commit
      - name: Template copy drift check
        run: python scripts/sync_template_copies.py --check
      - name: Unit tests
        run: pytest
      - name: Installed CLI smoke test
        run: |
          vaultwright --help
          tmp_vault="$(mktemp -d)/vault"
          VAULTWRIGHT_REPO="$PWD" vaultwright init "$tmp_vault"
          vaultwright --root "$tmp_vault" profile diff 0.1.0
          vaultwright --root "$tmp_vault" profile migrate --plan
          vaultwright --root "$tmp_vault" migrate annotations --plan
          vaultwright --root "$tmp_vault" lint
          vaultwright --root "$tmp_vault" plan
          vaultwright --root "$tmp_vault" sync
          vaultwright --root "$tmp_vault" status
      - name: Wheel CLI smoke test
        run: |
          tmp_build="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmp_build/wheelhouse"
          python -m venv "$tmp_build/venv"
          "$tmp_build/venv/bin/python" -m pip install "$tmp_build"/wheelhouse/vaultwright-*.whl
          tmp_vault="$tmp_build/vault"
          mkdir -p "$tmp_build/original-documents"
          "$tmp_build/venv/bin/vaultwright" init "$tmp_vault"
          test -f "$tmp_vault/CLAUDE.md"
          test -f "$tmp_vault/tools/catalog_report.py"
          test -f "$tmp_vault/tools/conversion_report.py"
          test -f "$tmp_vault/tools/m365_report.py"
          test -f "$tmp_vault/tools/overlap_report.py"
          test -f "$tmp_vault/tools/pilot_report.py"
          test -f "$tmp_vault/tools/recovery_report.py"
          test -f "$tmp_vault/tools/review_ledger.py"
          test -f "$tmp_vault/tools/sandbox_report.py"
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" profile diff 0.1.0
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" profile migrate --plan
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migrate annotations --plan
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" doctor
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" plan
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" sync
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" status
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" sandbox --source-root "$tmp_build/original-documents" --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" benchmark
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" catalog
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" catalog --check
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" catalog --html
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" catalog --html --check
          python -c 'import json, pathlib, sys; root = pathlib.Path(sys.argv[1]); (root / "40_delivery").mkdir(exist_ok=True); (root / "_mirrors" / "40_delivery").mkdir(parents=True, exist_ok=True); (root / "40_delivery" / "release-smoke.docx").write_bytes(b"synthetic release smoke source"); (root / "_mirrors" / "40_delivery" / "release-smoke.md").write_text("---\ntitle: Release Smoke\n---\n# Release Smoke\n", encoding="utf-8"); (root / "_meta" / "source-manifest.json").write_text(json.dumps({"version": 1, "records": [{"source_id": "release-smoke-source", "current_source_path": "40_delivery/release-smoke.docx", "mirror_path": "_mirrors/40_delivery/release-smoke.md", "source_format": "docx", "source_size": 30, "lifecycle_state": "clean", "warnings": [], "errors": []}]}), encoding="utf-8")' "$tmp_vault"
          python - "$tmp_vault" <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(sys.argv[1])
          task_pack = """schema_version: 1
          corpus: ci-wheel-smoke
          comparison_modes: [raw_source_folder, document_chat_transcript, vaultwright_markdown]
          scoring:
            scale: 0-2
          tasks:
            - id: smoke-answer
              family: answer
              prompt: What does the release smoke source prove?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Uses source-backed evidence]
            - id: smoke-reconcile
              family: reconcile
              prompt: Does the release smoke evidence conflict?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Identifies conflict state]
            - id: smoke-update
              family: update
              prompt: What should be reviewed after a source update?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Names refresh action]
            - id: smoke-audit
              family: audit
              prompt: What evidence supports the smoke task?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Finds provenance]
            - id: smoke-consolidate
              family: consolidate
              prompt: Where should release smoke facts live?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Avoids duplicate notes]
          """
          result_pack = """schema_version: 1
          corpus: ci-wheel-smoke
          results:
            - task_id: smoke-answer
              mode: vaultwright_markdown
              score: 2
              reviewer_corrections: 0
              cited_source_paths: [40_delivery/release-smoke.docx]
              cited_generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              privacy_or_provenance_violation: false
              prompt_safety_reviewed: true
              prompt_safety_violation: false
          """
          (root / "_meta" / "agent-readiness-tasks.yml").write_text(task_pack, encoding="utf-8")
          (root / "_meta" / "agent-readiness-results.yml").write_text(result_pack, encoding="utf-8")
          PY
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" benchmark --results _meta/agent-readiness-results.yml --require-citations --require-prompt-safety --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" conversion --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" conversion --init-results
          python -c 'import pathlib, sys; root = pathlib.Path(sys.argv[1]); (root / "_meta" / "conversion-quality-results.yml").write_text("schema_version: 1\ncorpus: ci-wheel-smoke\nreviews:\n- source_id: release-smoke-source\n  source_format: docx\n  priority: low\n  status: pass\n  score: 2\n  reviewer_corrections: 0\n  checked_source: true\n  checked_mirror: true\n  checked_links: true\n  issue_codes: []\n", encoding="utf-8")' "$tmp_vault"
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" conversion --results _meta/conversion-quality-results.yml --require-reviewed --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" overlap --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" overlap --worksheet
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" m365 --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" review --artifact CATALOG.html --status approved --reviewer CI --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" review --check
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migration --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migration --worksheet
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migration --runbook
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" migration --normalize-frontmatter-domains --worksheet
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" pilot --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" pilot --worksheet
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" recovery --json
          "$tmp_build/venv/bin/vaultwright" --root "$tmp_vault" recovery --worksheet
      - name: Template lint
        run: python template/tools/lint_vault.py
      - name: Regenerate example mirrors
        run: |
          tmp_example="$(mktemp -d)"
          for name in northwind-robotics-vault government-services-vault; do
            cp -R "examples/$name" "$tmp_example/"
            example="$tmp_example/$name"
            python "$example/tools/vaultwright.py" plan
            python "$example/tools/vaultwright.py" sync
            python "$example/tools/vaultwright.py" status
            echo "$example" >> /tmp/vaultwright-example-paths
          done
      - name: No-data scan after mirror generation
        run: |
          while IFS= read -r example; do
            find "$example" \( -name '*.md' -o -name '*.json' -o -name '*.jsonl' \) -type f -print0 | xargs -0 python scripts/no_data_scan.py --paths
          done < /tmp/vaultwright-example-paths
      - name: Example vault lint
        run: |
          while IFS= read -r example; do
            output="$(python "$example/tools/lint_vault.py")"
            printf '%s\n' "$output"
            grep -q "Orphan notes (no inbound links): 0" <<<"$output"
            grep -q "Potential duplicate/overlap notes: 0" <<<"$output"
          done < /tmp/vaultwright-example-paths
