name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: No-data scan
        run: python scripts/no_data_scan.py
      - name: Template copy drift check
        run: python scripts/sync_template_copies.py --check
      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip wheel . --no-deps -w /tmp/vaultwright-wheelhouse
      - name: Verify wheel install
        run: |
          python -m venv "$RUNNER_TEMP/vaultwright-release-venv"
          "$RUNNER_TEMP/vaultwright-release-venv/bin/python" -m pip install dist/vaultwright-*.whl
          tmp_vault="$RUNNER_TEMP/vaultwright-release-vault"
          mkdir -p "$RUNNER_TEMP/vaultwright-release-original-documents"
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" init "$tmp_vault"
          test -f "$tmp_vault/CLAUDE.md"
          test -f "$tmp_vault/tools/catalog_report.py"
          test -f "$tmp_vault/tools/conversion_report.py"
          test -f "$tmp_vault/tools/m365_report.py"
          test -f "$tmp_vault/tools/overlap_report.py"
          test -f "$tmp_vault/tools/review_ledger.py"
          test -f "$tmp_vault/tools/sandbox_report.py"
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" profile diff 0.1.0
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" profile migrate --plan
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" migrate annotations --plan
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" doctor
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" lint
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" plan
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" sync
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" status
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" sandbox --source-root "$RUNNER_TEMP/vaultwright-release-original-documents" --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" benchmark
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" catalog
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" catalog --check
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" catalog --html
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" catalog --html --check
          python -c 'import json, pathlib, sys; root = pathlib.Path(sys.argv[1]); (root / "40_delivery").mkdir(exist_ok=True); (root / "_mirrors" / "40_delivery").mkdir(parents=True, exist_ok=True); (root / "40_delivery" / "release-smoke.docx").write_bytes(b"synthetic release smoke source"); (root / "_mirrors" / "40_delivery" / "release-smoke.md").write_text("---\ntitle: Release Smoke\n---\n# Release Smoke\n", encoding="utf-8"); (root / "_meta" / "source-manifest.json").write_text(json.dumps({"version": 1, "records": [{"source_id": "release-smoke-source", "current_source_path": "40_delivery/release-smoke.docx", "mirror_path": "_mirrors/40_delivery/release-smoke.md", "source_format": "docx", "source_size": 30, "lifecycle_state": "clean", "warnings": [], "errors": []}]}), encoding="utf-8")' "$tmp_vault"
          python - "$tmp_vault" <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(sys.argv[1])
          task_pack = """schema_version: 1
          corpus: release-wheel-smoke
          comparison_modes: [raw_source_folder, document_chat_transcript, vaultwright_markdown]
          scoring:
            scale: 0-2
          tasks:
            - id: smoke-answer
              family: answer
              prompt: What does the release smoke source prove?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Uses source-backed evidence]
            - id: smoke-reconcile
              family: reconcile
              prompt: Does the release smoke evidence conflict?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Identifies conflict state]
            - id: smoke-update
              family: update
              prompt: What should be reviewed after a source update?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Names refresh action]
            - id: smoke-audit
              family: audit
              prompt: What evidence supports the smoke task?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Finds provenance]
            - id: smoke-consolidate
              family: consolidate
              prompt: Where should release smoke facts live?
              source_paths: [40_delivery/release-smoke.docx]
              generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              curated_paths: []
              success_criteria: [Avoids duplicate notes]
          """
          result_pack = """schema_version: 1
          corpus: release-wheel-smoke
          results:
            - task_id: smoke-answer
              mode: vaultwright_markdown
              score: 2
              reviewer_corrections: 0
              cited_source_paths: [40_delivery/release-smoke.docx]
              cited_generated_mirror_paths: [_mirrors/40_delivery/release-smoke.md]
              privacy_or_provenance_violation: false
              prompt_safety_reviewed: true
              prompt_safety_violation: false
          """
          (root / "_meta" / "agent-readiness-tasks.yml").write_text(task_pack, encoding="utf-8")
          (root / "_meta" / "agent-readiness-results.yml").write_text(result_pack, encoding="utf-8")
          PY
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" benchmark --results _meta/agent-readiness-results.yml --require-citations --require-prompt-safety --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" conversion --guide --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" conversion --init-results
          python -c 'import pathlib, sys; root = pathlib.Path(sys.argv[1]); (root / "_meta" / "conversion-quality-results.yml").write_text("schema_version: 1\ncorpus: release-wheel-smoke\nreviews:\n- source_id: release-smoke-source\n  source_format: docx\n  priority: low\n  status: pass\n  score: 2\n  reviewer_corrections: 0\n  checked_source: true\n  checked_mirror: true\n  checked_links: true\n  issue_codes: []\n", encoding="utf-8")' "$tmp_vault"
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" conversion --results _meta/conversion-quality-results.yml --require-reviewed --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" overlap --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" overlap --worksheet
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" m365 --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" review --artifact CATALOG.html --status approved --reviewer Release --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" review --check
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" migration --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" migration --worksheet
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" migration --runbook
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" migration --normalize-frontmatter-domains --worksheet
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" pilot --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" pilot --worksheet
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" recovery --json
          "$RUNNER_TEMP/vaultwright-release-venv/bin/vaultwright" --root "$tmp_vault" recovery --worksheet
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vaultwright-dist-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

  publish-draft:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          name: vaultwright-dist-${{ github.ref_name }}
          path: dist
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            release_json="$(gh release view "$GITHUB_REF_NAME" --json isDraft,isPrerelease)"
            if ! printf '%s' "$release_json" | python -c 'import json, sys; data = json.load(sys.stdin); sys.exit(0 if data.get("isDraft") and data.get("isPrerelease") else 1)'; then
              echo "::error::Existing release $GITHUB_REF_NAME is not both draft and prerelease; refusing to clobber assets."
              exit 1
            fi
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --draft \
              --prerelease
          fi
